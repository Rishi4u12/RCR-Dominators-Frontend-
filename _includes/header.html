<head>
    <title>Site Title</title>
    <style>
        .site-header {
            backdrop-filter: blur(30px);
            border-bottom: 3px solid #b94a1c;
            background: rgba(26, 20, 16, 0.95);
            z-index: 999999999;
            position: fixed;
            width: 100%;
            top: 0;
            height: 54px;
        }
        .site-header .wrapper {
            max-width: 100% !important;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 54px;
            padding: 0 20px;
            position: relative;
        }
        .site-title {
            position: absolute;
            left: 20px;
            display: flex;
            align-items: center;
            flex-shrink: 0;
            text-decoration: none;
            padding-right: 12px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .site-title:visited { text-decoration: none; }
        .site-nav { display: flex; align-items: center; height: 54px; }

        .rr-nav { display: flex; align-items: center; flex-wrap: nowrap; height: 54px; }
        .rr-item { position: relative; height: 54px; display: flex; align-items: center; }
        .rr-link {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #e8e0d0 !important;
            text-decoration: none !important;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0 18px;
            height: 54px;
            line-height: 54px;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            cursor: pointer;
            white-space: nowrap;
            background: none;
            border-top: none;
            border-left: none;
            border-right: none;
        }
        .rr-link:hover { color: #c9943a !important; border-bottom-color: #c9943a; }
        .rr-arr { font-size: 8px; transition: transform 0.2s; }
        .rr-item.open .rr-arr { transform: rotate(180deg); }
        .rr-drop {
            display: none;
            position: absolute;
            top: 54px;
            left: 0;
            background: rgba(42, 31, 24, 0.98);
            border: 1px solid rgba(255,255,255,0.1);
            border-top: 2px solid #b94a1c;
            border-radius: 0 0 8px 8px;
            min-width: 220px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden;
            z-index: 200;
        }
        .rr-item.open .rr-drop { display: block; animation: rrIn 0.2s ease; }
        @keyframes rrIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
        .rr-drop a {
            display: block;
            padding: 12px 20px;
            color: #8c7f6e !important;
            text-decoration: none !important;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.15s;
            white-space: nowrap;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .rr-drop a:last-child { border-bottom: none; }
        .rr-drop a:hover {
            background: rgba(201,148,58,0.15);
            color: #c9943a !important;
            padding-left: 26px;
        }

        #rrAuthArea { margin-left: 4px; display: flex; align-items: center; }
        #rrLoginLink {
            display: flex;
            align-items: center;
            gap: 6px;
            color: #e8e0d0 !important;
            text-decoration: none !important;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.12em;
            text-transform: uppercase;
            padding: 0 18px;
            height: 54px;
            border-bottom: 3px solid transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }
        #rrLoginLink:hover { color: #c9943a !important; border-bottom-color: #c9943a; }

        #rrProfileItem { display: none; position: relative; height: 54px; align-items: center; }
        #rrProfileItem.visible { display: flex; }
        #rrProfileBtn {
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(201,148,58,0.12);
            border: 1px solid rgba(201,148,58,0.3);
            border-radius: 6px;
            padding: 6px 14px;
            margin: 0 8px;
            cursor: pointer;
            transition: background 0.2s;
            color: #c9943a;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
        }
        #rrProfileBtn:hover { background: rgba(201,148,58,0.25); }
        .rr-avatar {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #b94a1c;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 13px;
            font-weight: 700;
            flex-shrink: 0;
        }
        #rrProfileDrop {
            display: none;
            position: absolute;
            top: 54px;
            right: 0;
            background: rgba(42,31,24,0.98);
            border: 1px solid rgba(255,255,255,0.1);
            border-top: 2px solid #b94a1c;
            border-radius: 0 0 8px 8px;
            min-width: 200px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden;
            z-index: 300;
        }
        #rrProfileItem.open #rrProfileDrop { display: block; animation: rrIn 0.2s ease; }
        .rr-profile-name {
            padding: 14px 20px 10px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #e8e0d0;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .rr-profile-name span { display: block; font-size: 10px; color: #8c7f6e; margin-top: 2px; }
        #rrProfileDrop a, #rrLogoutBtn {
            display: block;
            width: 100%;
            text-align: left;
            padding: 11px 20px;
            color: #8c7f6e !important;
            text-decoration: none !important;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            transition: all 0.15s;
            white-space: nowrap;
            border-bottom: 1px solid rgba(255,255,255,0.05);
            background: none;
            border-left: none;
            border-right: none;
            border-top: none;
            cursor: pointer;
        }
        #rrProfileDrop a:last-child, #rrLogoutBtn { border-bottom: none; }
        #rrProfileDrop a:hover, #rrLogoutBtn:hover {
            background: rgba(201,148,58,0.15);
            color: #c9943a !important;
            padding-left: 26px;
        }
        #rrLogoutBtn { color: #e07050 !important; }
        #rrLogoutBtn:hover { color: #fb923c !important; background: rgba(185,74,28,0.15); }

        @media screen and (max-width: 999px) { .rr-nav { display: none; } }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="wrapper">
            <a class="site-title" rel="author" href="{{ "/" | relative_url }}">
                <img src="{{ site.baseurl }}/assets/images/PMRR-Logo.png" alt="Poway Midland Railroad" style="height:46px;">
            </a>

            <nav class="site-nav">
                <div class="rr-nav">
                    <div class="rr-item">
                        <a href="/railroad/home" class="rr-link">🏠 Home</a>
                    </div>

                    <div class="rr-item" id="rrSched">
                        <button class="rr-link" onclick="toggleRR('rrSched')">
                            📅 Schedule <span class="rr-arr">▼</span>
                        </button>
                        <div class="rr-drop">
                            <a href="/railroad/schedule">🚂 Train Schedule</a>
                            <a href="/railroad/calendar">🗓 Operations Calendar</a>
                            <a href="/railroad/book">🎟 Book a Ride</a>
                        </div>
                    </div>

                    <div class="rr-item">
                        <a href="/railroad/notes" class="rr-link">📸 Notes</a>
                    </div>

                    <div class="rr-item">
                        <a href="/railroad/forecast" class="rr-link">📊 Forecast</a>
                    </div>

                    <div class="rr-item" id="rrAbout">
                        <button class="rr-link" onclick="toggleRR('rrAbout')">
                            ℹ️ Explore <span class="rr-arr">▼</span>
                        </button>
                        <div class="rr-drop">
                            <a href="/railroad/trains">🚂 Our Trains</a>
                            <a href="/railroad/events">🎪 Events</a>
                            <a href="/railroad/camera">🎥 Live Camera</a>
                            <a href="/railroad/assistant">🤖 AI Assistant</a>
                            <a href="/railroad/contact">📬 Contact</a>
                        </div>
                    </div>

                    <div id="rrAuthArea">
                        <a id="rrLoginLink" href="/railroad/login">🔑 Login</a>

                        <div class="rr-item" id="rrProfileItem">
                            <button id="rrProfileBtn" onclick="toggleRR('rrProfileItem')">
                                <div class="rr-avatar" id="rrAvatarInitial">?</div>
                                <span id="rrNavName">Account</span>
                                <span class="rr-arr">▼</span>
                            </button>
                            <div id="rrProfileDrop">
                                <div class="rr-profile-name" id="rrDropName">
                                    Loading...
                                    <span id="rrDropEmail"></span>
                                </div>
                                <a href="/railroad/profile">👤 My Profile</a>
                                <button id="rrLogoutBtn" onclick="rrNavLogout()">🚪 Logout</button>
                            </div>
                        </div>
                    </div>
                </div>
            </nav>
        </div>
    </header>

    <script>
        const RR_BACKEND = 'http://localhost:8587';

        function toggleRR(id) {
            const item = document.getElementById(id);
            const isOpen = item.classList.contains('open');
            document.querySelectorAll('.rr-item.open').forEach(el => el.classList.remove('open'));
            if (!isOpen) item.classList.add('open');
        }

        document.addEventListener('click', e => {
            if (!e.target.closest('.rr-item') && !e.target.closest('#rrProfileItem')) {
                document.querySelectorAll('.rr-item.open').forEach(el => el.classList.remove('open'));
            }
        });

        async function rrCheckAuth() {
            try {
                const res = await fetch(`${RR_BACKEND}/api/auth/status`, { credentials: 'include' });
                const data = await res.json();
                if (data.logged_in) {
                    rrShowLoggedIn(data);
                } else {
                    rrShowGuest();
                }
            } catch {
                rrShowGuest();
            }
        }

        function rrShowLoggedIn(user) {
            document.getElementById('rrLoginLink').style.display = 'none';
            const profileItem = document.getElementById('rrProfileItem');
            profileItem.classList.add('visible');
            document.getElementById('rrNavName').textContent = user.name.split(' ')[0];
            document.getElementById('rrAvatarInitial').textContent = user.name.charAt(0).toUpperCase();
            document.getElementById('rrDropName').childNodes[0].textContent = user.name;
            document.getElementById('rrDropEmail').textContent = user.email;
        }

        function rrShowGuest() {
            document.getElementById('rrLoginLink').style.display = 'flex';
            document.getElementById('rrProfileItem').classList.remove('visible');
        }

        async function rrNavLogout() {
            try {
                await fetch(`${RR_BACKEND}/api/auth/logout`, { method: 'POST', credentials: 'include' });
            } catch {}
            rrShowGuest();
            if (window.location.pathname === '/railroad/profile') {
                window.location.href = '/railroad/login';
            }
        }

        rrCheckAuth();
    </script>
</body>
