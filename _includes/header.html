<head>
    <title>Site Title</title>
    <style>
        .site-header {
            backdrop-filter: blur(30px);
            border-bottom: 3px solid #b94a1c;
            background: rgba(26, 20, 16, 0.95);
            z-index: 999999999;
            position: fixed;
            width: 100%;
            top: 0px;
            height: 54px;
        }
        .site-header .wrapper {
            max-width: 100% !important;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 54px;
            padding: 0 20px;
            position: relative;
        }
        .site-title {
            position: absolute; left: 20px;
            display: flex; align-items: center;
            flex-shrink: 0; text-decoration: none;
            padding-right: 12px;
            border-right: 1px solid rgba(255,255,255,0.1);
        }
        .site-title:visited { text-decoration: none; }
        .site-nav { display: flex; align-items: center; height: 54px; }

        /* ── Railroad Nav ── */
        .rr-nav { display: flex; align-items: center; flex-wrap: nowrap; height: 54px; }
        .rr-item { position: relative; height: 54px; display: flex; align-items: center; }
        .rr-link {
            display: flex; align-items: center; gap: 6px;
            color: #e8e0d0 !important; text-decoration: none !important;
            font-family: 'Courier New', monospace;
            font-size: 11px; letter-spacing: 0.12em; text-transform: uppercase;
            padding: 0 22px; height: 54px; line-height: 54px;
            border-bottom: 3px solid transparent;
            transition: all 0.2s; cursor: pointer; white-space: nowrap;
            background: none; border-top: none; border-left: none; border-right: none;
        }
        .rr-link:hover { color: #c9943a !important; border-bottom-color: #c9943a; }
        .rr-arr { font-size: 8px; transition: transform 0.2s; }
        .rr-item.open .rr-arr { transform: rotate(180deg); }
        .rr-drop {
            display: none; position: absolute; top: 54px; left: 0;
            background: rgba(42, 31, 24, 0.98);
            border: 1px solid rgba(255,255,255,0.1);
            border-top: 2px solid #b94a1c;
            border-radius: 0 0 8px 8px;
            min-width: 220px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            overflow: hidden; z-index: 200;
        }
        .rr-item.open .rr-drop { display: block; animation: rrIn 0.2s ease; }
        @keyframes rrIn { from{opacity:0;transform:translateY(-4px);} to{opacity:1;transform:none;} }
        .rr-drop a {
            display: block; padding: 12px 20px;
            color: #8c7f6e !important; text-decoration: none !important;
            font-family: 'Courier New', monospace;
            font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase;
            transition: all 0.15s; white-space: nowrap;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .rr-drop a:last-child { border-bottom: none; }
        .rr-drop a:hover { background: rgba(201,148,58,0.15); color: #c9943a !important; padding-left: 26px; }
        #loginArea { margin-left: 4px; }
        @media screen and (max-width: 999px) { .rr-nav { display: none; } }
    </style>
</head>

<body>
    <header class="site-header">
        <div class="wrapper">
            <a class="site-title" rel="author" href="{{ "/" | relative_url }}">
                <img src="{{ site.baseurl }}/assets/images/PMRR-Logo.png" alt="Poway Midland Railroad" style="height:46px;">
            </a>

            <nav class="site-nav">
                <div class="rr-nav">

                    <div class="rr-item">
                        <a href="/railroad/home" class="rr-link">🏠 Home</a>
                    </div>

                    <div class="rr-item" id="rrSched">
                        <button class="rr-link" onclick="toggleRR('rrSched')">
                            📅 Schedule <span class="rr-arr">▼</span>
                        </button>
                        <div class="rr-drop">
                            <a href="/railroad/schedule">🚂 Train Schedule</a>
                            <a href="#">👷 Volunteer Schedule</a>
                        </div>
                    </div>

                    <div class="rr-item" id="rrAbout">
                        <button class="rr-link" onclick="toggleRR('rrAbout')">
                            ℹ️ About Us <span class="rr-arr">▼</span>
                        </button>
                        <div class="rr-drop">
                            <a href="/railroad/trains">🚂 Our Trains</a>
                            <a href="#">📖 History</a>
                        </div>
                    </div>

                    <div class="rr-item">
                        <a href="/railroad/events" class="rr-link">🎪 Events</a>
                    </div>

                    <a id="loginArea" href="/railroad/login" class="rr-link">Login</a>

                </div>
            </nav>
        </div>
    </header>

    <script>
        function toggleRR(id) {
            const item = document.getElementById(id);
            const isOpen = item.classList.contains('open');
            document.querySelectorAll('.rr-item.open').forEach(el => el.classList.remove('open'));
            if (!isOpen) item.classList.add('open');
        }
        document.addEventListener('click', e => {
            if (!e.target.closest('.rr-item'))
                document.querySelectorAll('.rr-item.open').forEach(el => el.classList.remove('open'));
        });
    </script>

</body>
